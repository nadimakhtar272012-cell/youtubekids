<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="description" content="SafeTube Kids - A kid-safe video platform for approved YouTube content">
    <title>SafeTube Kids - Safe Video Streaming for Children</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF4757;
            --secondary-color: #2C3E50;
            --bg-dark: #0F0F0F;
            --bg-darker: #030303;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #FFFFFF;
            --text-secondary: #A9A9A9;
            --accent-neon: #FF4757;
            --glass-effect: rgba(255, 255, 255, 0.1);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: auto;
            background: linear-gradient(135deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-primary);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(15, 15, 15, 0.98) 0%, rgba(15, 15, 15, 0.9) 100%);
            border-bottom: 3px solid var(--accent-neon);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(255, 71, 87, 0.15);
            flex-shrink: 0;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-neon) 0%, #FF6B7A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .logo::before {
            content: "🎬";
            font-size: 2.2rem;
        }

        .nav-center {
            flex: 1;
            margin: 0 1.5rem;
            min-width: 200px;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: var(--glass-effect);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-nav {
            padding: 0.7rem 1.2rem;
            background: var(--glass-effect);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: var(--text-primary);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
            white-space: nowrap;
        }

        .btn-nav:hover, .btn-nav:focus {
            background: var(--accent-neon);
            color: white;
            border-color: var(--accent-neon);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .safe-badge {
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2) 0%, rgba(76, 175, 80, 0.1) 100%);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #81C784;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: pulse-badge 2s infinite;
            white-space: nowrap;
        }

        @keyframes pulse-badge {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* MAIN CONTAINER */
        .main-container {
            display: flex;
            flex: 1;
            gap: 1.5rem;
            padding: 1.5rem;
            min-height: 0;
        }

        /* PLAYER SECTION - FULL SIZE */
        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 0;
            min-height: 0;
        }

        .player-container {
            position: relative;
            width: 100%;
            flex: 1;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255, 71, 87, 0.25);
            border: 2px solid rgba(255, 71, 87, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        .player-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-container iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border: 4px solid var(--glass-effect);
            border-top: 4px solid var(--accent-neon);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 10;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .video-info {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 71, 87, 0.1);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .video-category {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: var(--accent-neon);
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .player-controls {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .btn-control {
            padding: 0.7rem 1.2rem;
            background: var(--glass-effect);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            outline: none;
            white-space: nowrap;
        }

        .btn-control:hover, .btn-control:focus {
            background: var(--accent-neon);
            color: white;
            border-color: var(--accent-neon);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3);
        }

        .btn-control.active {
            background: var(--accent-neon);
            color: white;
            border-color: var(--accent-neon);
        }

        .timer-display {
            background: var(--glass-effect);
            padding: 0.7rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            color: var(--accent-neon);
            font-size: 1rem;
            min-width: 140px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SIDEBAR */
        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 0;
            flex-shrink: 0;
        }

        .sidebar-header {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            padding: 0 0.5rem;
        }

        .category-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 0.5rem 0.9rem;
            background: var(--glass-effect);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
            white-space: nowrap;
        }

        .category-btn:hover, .category-btn.active {
            background: var(--accent-neon);
            color: white;
            border-color: var(--accent-neon);
        }

        .videos-grid {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-right: 0.5rem;
            min-height: 0;
        }

        .videos-grid::-webkit-scrollbar {
            width: 8px;
        }

        .videos-grid::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 10px;
        }

        .videos-grid::-webkit-scrollbar-thumb {
            background: var(--accent-neon);
            border-radius: 10px;
        }

        .videos-grid::-webkit-scrollbar-thumb:hover {
            background: #FF6B7A;
        }

        .video-card {
            position: relative;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            background: var(--glass-effect);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            gap: 0.8rem;
            padding: 0.8rem;
            outline: none;
            flex-shrink: 0;
        }

        .video-card:hover, .video-card:focus {
            background: var(--glass-effect);
            border-color: var(--accent-neon);
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.2);
        }

        .video-card.active {
            background: var(--glass-effect);
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        .video-thumbnail {
            width: 100px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg-dark);
        }

        .video-card-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .video-card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-card-category {
            font-size: 0.75rem;
            color: var(--accent-neon);
            font-weight: 600;
        }

        .delete-btn {
            display: none;
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            background: var(--accent-neon);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #FF6B7A;
            transform: scale(1.1);
        }

        .video-card.admin-mode .delete-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MODALS */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-dark);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            animation: slideUp 0.3s ease;
            position: relative;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: var(--glass-effect);
            border: none;
            border-radius: 50%;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--accent-neon);
            color: white;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--glass-effect);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group option {
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .pin-input {
            font-size: 2rem;
            letter-spacing: 1rem;
            text-align: center;
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-primary {
            background: var(--accent-neon);
            color: white;
        }

        .btn-primary:hover, .btn-primary:focus {
            background: #FF6B7A;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.4);
        }

        .btn-secondary {
            background: var(--glass-effect);
            color: var(--text-primary);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .btn-secondary:hover, .btn-secondary:focus {
            background: var(--glass-effect);
            border-color: var(--accent-neon);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .sidebar {
                width: 100%;
                max-height: 250px;
            }

            .player-section {
                min-height: 0;
            }

            .navbar {
                flex-direction: column;
                gap: 0.8rem;
                padding: 0.8rem;
            }

            .logo {
                font-size: 1.5rem;
            }

            .logo::before {
                font-size: 1.5rem;
            }

            .nav-center {
                width: 100%;
                margin: 0;
            }

            .search-container {
                max-width: 100%;
            }

            .nav-buttons {
                width: 100%;
                justify-content: space-between;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0.8rem;
                gap: 0.8rem;
                flex-wrap: wrap;
            }

            .logo {
                font-size: 1.3rem;
            }

            .logo::before {
                font-size: 1.3rem;
            }

            .main-container {
                flex-direction: column;
                padding: 0.8rem;
                gap: 0.8rem;
            }

            .player-container {
                min-height: 250px;
            }

            .sidebar {
                max-height: 200px;
            }

            .nav-center {
                min-width: 100%;
            }

            .search-input {
                font-size: 0.85rem;
            }

            .btn-nav {
                padding: 0.6rem 1rem;
                font-size: 0.8rem;
            }

            .safe-badge {
                font-size: 0.75rem;
            }
        }

        /* TV MODE - Ultra Large */
        @media (min-width: 1920px) {
            body {
                font-size: 1.2rem;
            }

            .navbar {
                padding: 1.5rem 2rem;
                gap: 1.5rem;
            }

            .logo {
                font-size: 2.5rem;
            }

            .logo::before {
                font-size: 2.5rem;
            }

            .main-container {
                padding: 2rem;
                gap: 2rem;
            }

            .btn-nav, .btn-control, .category-btn {
                padding: 1rem 1.8rem;
                font-size: 1.1rem;
            }

            .video-card {
                padding: 1rem;
                gap: 1rem;
            }

            .video-thumbnail {
                width: 140px;
                height: 100px;
            }

            .video-title {
                font-size: 1.4rem;
            }

            .sidebar {
                width: 380px;
            }

            .modal-content {
                max-width: 600px;
                padding: 2.5rem;
            }

            .form-group input,
            .form-group select,
            .form-group textarea {
                padding: 1.2rem;
                font-size: 1.1rem;
            }
        }

        /* ERROR STATE */
        .error-message {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid var(--accent-neon);
            color: var(--accent-neon);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.5);
            color: #81C784;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        /* EMPTY STATE */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">SafeTube Kids</div>
        <div class="nav-center">
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput" 
                    placeholder="Search approved videos..."
                    aria-label="Search videos"
                >
            </div>
        </div>
        <div class="nav-buttons">
            <div class="safe-badge">✓ Safe Mode Enabled</div>
            <button class="btn-nav" id="adminToggle" aria-label="Toggle admin mode">👤 Admin</button>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <!-- PLAYER SECTION -->
        <div class="player-section">
            <div class="player-container">
                <div class="player-wrapper" id="videoPlayer"></div>
            </div>

            <div class="video-info">
                <div class="video-title" id="videoTitle">Select a video to play</div>
                <div class="video-category" id="videoCategory">No Video</div>
            </div>

            <div class="player-controls">
                <button class="btn-control" id="fullscreenBtn" aria-label="Toggle fullscreen">
                    🖥️ Fullscreen
                </button>
                <button class="btn-control" id="autoplayBtn" aria-label="Toggle autoplay">
                    ▶️ Autoplay: OFF
                </button>
                <button class="btn-control" id="timerBtn" aria-label="Set watch timer">
                    ⏱️ Timer: OFF
                </button>
                <div class="timer-display" id="timerDisplay" style="display: none;">
                    Time: 60:00
                </div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">📺 Your Videos</div>
            
            <div class="category-filter">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="Learning">Learn</button>
                <button class="category-btn" data-category="Cartoons">Cartoon</button>
                <button class="category-btn" data-category="Music">Music</button>
                <button class="category-btn" data-category="Bedtime">Sleep</button>
            </div>

            <div class="videos-grid" id="videosGrid">
                <!-- Videos will be populated here -->
            </div>
        </div>
    </div>

    <!-- PIN VERIFICATION MODAL -->
    <div class="modal" id="pinModal">
        <div class="modal-content">
            <button class="modal-close" id="pinModalClose">×</button>
            <div class="modal-header">🔐 Parent Mode</div>
            <div class="form-group">
                <label>Enter 4-Digit PIN:</label>
                <input 
                    type="password" 
                    class="pin-input form-group input" 
                    id="pinInput" 
                    maxlength="4" 
                    placeholder="••••"
                    aria-label="Enter PIN"
                >
            </div>
            <div class="btn-group">
                <button class="btn-primary" id="pinSubmit">Unlock</button>
                <button class="btn-secondary" id="pinCancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ADMIN MODE MODAL -->
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <button class="modal-close" id="adminModalClose">×</button>
            <div class="modal-header">👨‍👩‍👧‍👦 Parent Controls</div>
            <div id="adminMessage"></div>

            <!-- PIN SETUP SECTION -->
            <div id="pinSetupSection">
                <div class="form-group">
                    <label>Set Your PIN (4 digits):</label>
                    <input 
                        type="text" 
                        class="pin-input form-group input" 
                        id="setPinInput" 
                        maxlength="4" 
                        placeholder="••••"
                        aria-label="Set PIN"
                    >
                </div>
            </div>

            <!-- ADD VIDEO SECTION -->
            <div id="addVideoSection">
                <div class="form-group">
                    <label>YouTube URL:</label>
                    <input 
                        type="url" 
                        id="videoUrl" 
                        placeholder="https://www.youtube.com/watch?v=..."
                        aria-label="Video URL"
                    >
                </div>
                <div class="form-group">
                    <label>Video Title:</label>
                    <input 
                        type="text" 
                        id="videoTitle2" 
                        placeholder="Enter video title"
                        aria-label="Video title"
                    >
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <select id="videoCategory2" aria-label="Video category">
                        <option value="Learning">Learning</option>
                        <option value="Cartoons">Cartoons</option>
                        <option value="Music">Music</option>
                        <option value="Bedtime">Bedtime</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-primary" id="adminAction">Add Video</button>
                <button class="btn-secondary" id="adminCancel">Exit</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== APP CONFIGURATION ====================
        const APP_CONFIG = {
            STORAGE_KEY: 'safetube_kids_videos',
            PIN_KEY: 'safetube_kids_pin',
            DEFAULT_PIN: '1234',
            WATCH_TIME_DEFAULT: 60,
        };

        // ==================== VIDEO DATABASE ====================
        const defaultVideos = [
            {
                title: "Baa Baa Black Sheep + Nursery Rhymes",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=Gmrj5-70xV4"
            },
            {
                title: "Phonics Song - A For Apple",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=hq3yfQnllfQ"
            },
            {
                title: "Hindi Varnamala - अ से अनार",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=LWd_z7upri8"
            },
            {
                title: "क से कबूतर - Hindi Alphabet",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=abl0bggs-1E"
            },
            {
                title: "Barish Aayi Cham Cham",
                category: "Music",
                youtubeUrl: "https://www.youtube.com/watch?v=YIWbxFHxWKY"
            },
            {
                title: "नानी तेरी मोरनी - Hindi Poem",
                category: "Bedtime",
                youtubeUrl: "https://www.youtube.com/watch?v=bzHgVtXuEWg"
            },
            {
                title: "Nani Teri Morni - Jingle Toons",
                category: "Music",
                youtubeUrl: "https://www.youtube.com/watch?v=k8sN7Vl3IFQ"
            },
            {
                title: "Parts of Body Learning",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=NUMz00m8ySk"
            },
            {
                title: "Learning at Home - Bebefinn",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=kIoD2MPKVrw"
            },
            {
                title: "The Bear and the Bee",
                category: "Cartoons",
                youtubeUrl: "https://www.youtube.com/watch?v=jKi2SvWOCXc"
            },
            {
                title: "Days of the Week - ChuChu TV",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=xPq1KrYWbqo"
            },
            {
                title: "ABC Flashcards for Toddlers",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=p-kAI-qOeJA"
            },
            {
                title: "Pre School Learning",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=kCHeKc2R96o"
            },
            {
                title: "ChuChu TV Learning Playlist",
                category: "Learning",
                youtubeUrl: "https://www.youtube.com/watch?v=VL0sB-LXroU"
            }
        ];

        // ==================== STATE MANAGEMENT ====================
        let appState = {
            videos: [],
            currentVideo: null,
            adminMode: false,
            autoplay: false,
            timerActive: false,
            timerMinutes: APP_CONFIG.WATCH_TIME_DEFAULT,
            currentCategory: 'all'
        };

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            initializeApp();
            setupEventListeners();
            loadVideos();
            renderVideos();

            if (!appState.currentVideo && appState.videos.length > 0) {
                playVideo(appState.videos[0]);
            }
        });

        function initializeApp() {
            const stored = localStorage.getItem(APP_CONFIG.STORAGE_KEY);
            if (stored) {
                appState.videos = JSON.parse(stored);
            } else {
                appState.videos = [...defaultVideos];
                saveVideos();
            }
        }

        // ==================== EVENT LISTENERS ====================
        function setupEventListeners() {
            document.getElementById('adminToggle').addEventListener('click', handleAdminToggle);
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('fullscreenBtn').addEventListener('click', handleFullscreen);
            document.getElementById('autoplayBtn').addEventListener('click', handleAutoplay);
            document.getElementById('timerBtn').addEventListener('click', handleTimer);

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    appState.currentCategory = e.target.dataset.category;
                    renderVideos();
                });
            });

            document.getElementById('pinModalClose').addEventListener('click', () => closeModal('pinModal'));
            document.getElementById('pinCancel').addEventListener('click', () => closeModal('pinModal'));
            document.getElementById('pinSubmit').addEventListener('click', handlePinSubmit);
            document.getElementById('pinInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handlePinSubmit();
            });

            document.getElementById('adminModalClose').addEventListener('click', handleAdminModalClose);
            document.getElementById('adminCancel').addEventListener('click', handleAdminModalClose);
            document.getElementById('adminAction').addEventListener('click', handleAdminAction);

            document.addEventListener('keydown', handleKeyboard);
        }

        // ==================== ADMIN & SECURITY ====================
        function handleAdminToggle() {
            if (appState.adminMode) {
                exitAdminMode();
            } else {
                const pinSet = localStorage.getItem(APP_CONFIG.PIN_KEY);
                if (pinSet) {
                    openModal('pinModal');
                } else {
                    openAdminMode();
                }
            }
        }

        function handlePinSubmit() {
            const pin = document.getElementById('pinInput').value;
            const storedPin = localStorage.getItem(APP_CONFIG.PIN_KEY) || APP_CONFIG.DEFAULT_PIN;

            if (pin === storedPin) {
                closeModal('pinModal');
                openAdminMode();
                document.getElementById('pinInput').value = '';
            } else {
                alert('❌ Incorrect PIN!');
                document.getElementById('pinInput').value = '';
            }
        }

        function openAdminMode() {
            appState.adminMode = true;
            document.getElementById('adminToggle').textContent = '✓ Admin Mode ON';
            document.getElementById('adminToggle').style.background = 'var(--accent-neon)';
            
            document.querySelectorAll('.video-card').forEach(card => {
                card.classList.add('admin-mode');
            });

            openModal('adminModal');
            
            const pinSet = localStorage.getItem(APP_CONFIG.PIN_KEY);
            const adminMessage = document.getElementById('adminMessage');
            
            if (!pinSet) {
                adminMessage.innerHTML = '<div class="error-message">⚠️ Set your PIN first to secure Parent Mode</div>';
                document.getElementById('setPinInput').style.display = 'block';
                document.getElementById('addVideoSection').style.display = 'none';
                document.getElementById('adminAction').textContent = 'Set PIN';
            } else {
                adminMessage.innerHTML = '<div class="success-message">✓ Parent Mode Active - Add, Edit, Delete Videos</div>';
                document.getElementById('setPinInput').style.display = 'none';
                document.getElementById('addVideoSection').style.display = 'block';
                document.getElementById('adminAction').textContent = 'Add Video';
            }
        }

        function exitAdminMode() {
            appState.adminMode = false;
            document.getElementById('adminToggle').textContent = '👤 Admin';
            document.getElementById('adminToggle').style.background = 'var(--glass-effect)';
            
            document.querySelectorAll('.video-card').forEach(card => {
                card.classList.remove('admin-mode');
            });

            closeModal('adminModal');
        }

        function handleAdminAction() {
            const pinSet = localStorage.getItem(APP_CONFIG.PIN_KEY);

            if (!pinSet) {
                const pin = document.getElementById('setPinInput').value;
                if (pin.length !== 4 || isNaN(pin)) {
                    alert('⚠️ PIN must be 4 digits!');
                    return;
                }
                localStorage.setItem(APP_CONFIG.PIN_KEY, pin);
                alert('✓ PIN set successfully! Admin mode now requires PIN.');
                document.getElementById('setPinInput').value = '';
                exitAdminMode();
            } else {
                const url = document.getElementById('videoUrl').value;
                const title = document.getElementById('videoTitle2').value;
                const category = document.getElementById('videoCategory2').value;

                if (!url || !title) {
                    alert('⚠️ Please fill in all fields!');
                    return;
                }

                const videoId = extractYoutubeId(url);
                if (!videoId) {
                    alert('⚠️ Invalid YouTube URL!');
                    return;
                }

                appState.videos.push({
                    title: title,
                    category: category,
                    youtubeUrl: `https://www.youtube.com/watch?v=${videoId}`
                });

                saveVideos();
                renderVideos();

                document.getElementById('videoUrl').value = '';
                document.getElementById('videoTitle2').value = '';
                document.getElementById('videoCategory2').value = 'Learning';

                alert('✓ Video added successfully!');
            }
        }

        function handleAdminModalClose() {
            if (appState.adminMode) {
                exitAdminMode();
            } else {
                closeModal('adminModal');
            }
        }

        // ==================== VIDEO MANAGEMENT ====================
        function extractYoutubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return match && match[2].length === 11 ? match[2] : null;
        }

        function getYoutubeThumbnail(url) {
            const videoId = extractYoutubeId(url);
            return videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : '';
        }

        function getYoutubeEmbedUrl(url) {
            const videoId = extractYoutubeId(url);
            if (!videoId) return '';
            
            return `https://www.youtube.com/embed/${videoId}?autoplay=0&controls=1&modestbranding=1&rel=0&fs=1&playsinline=1`;
        }

        // ==================== VIDEO RENDERING ====================
        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            grid.innerHTML = '';

            let filtered = appState.videos;

            if (appState.currentCategory !== 'all') {
                filtered = filtered.filter(v => v.category === appState.currentCategory);
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(v => 
                    v.title.toLowerCase().includes(searchTerm) ||
                    v.category.toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📺</div><p>No videos found</p></div>';
                return;
            }

            filtered.forEach((video, index) => {
                const card = createVideoCard(video, index);
                grid.appendChild(card);
            });
        }

        function createVideoCard(video, index) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.tabIndex = 0;
            card.setAttribute('role', 'button');
            card.dataset.url = video.youtubeUrl;
            if (appState.currentVideo === video.youtubeUrl) card.classList.add('active');
            if (appState.adminMode) card.classList.add('admin-mode');

            const thumbnail = getYoutubeThumbnail(video.youtubeUrl);

            card.innerHTML = `
                <img src="${thumbnail}" alt="${video.title}" class="video-thumbnail" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2270%22%3E%3Crect fill=%22%23222%22 width=%22100%22 height=%2270%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2216%22 fill=%22%23666%22%3E▶%3C/text%3E%3C/svg%3E'">
                <div class="video-card-info">
                    <div class="video-card-title">${video.title}</div>
                    <div class="video-card-category">${video.category}</div>
                </div>
                <button type="button" class="delete-btn">×</button>
            `;

            const deleteBtn = card.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', (event) => deleteVideo(event, index));

            card.addEventListener('click', (event) => playVideo(video, event));
            card.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    playVideo(video, event);
                }
            });
            card.addEventListener('focus', () => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));

            return card;
        }

        function playVideo(video, event) {
            appState.currentVideo = video.youtubeUrl;

            const embedUrl = getYoutubeEmbedUrl(video.youtubeUrl);
            const videoId = extractYoutubeId(video.youtubeUrl);
            
            document.getElementById('videoPlayer').innerHTML = `
                <iframe 
                    width="100%" 
                    height="100%"
                    src="${embedUrl}" 
                    title="${video.title}"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    referrerpolicy="no-referrer-when-cross-origin"
                    sandbox="allow-same-origin allow-scripts allow-popups allow-presentation"
                    allowfullscreen
                    loading="lazy"
                    style="border: none; display: block;"
                ></iframe>
            `;

            document.getElementById('videoTitle').textContent = video.title;
            document.getElementById('videoCategory').textContent = video.category;

            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => card.classList.remove('active'));
            if (event?.currentTarget) {
                event.currentTarget.classList.add('active');
            } else {
                cards.forEach(card => {
                    if (card.dataset.url === video.youtubeUrl) {
                        card.classList.add('active');
                    }
                });
            }

            if (appState.timerActive) {
                resetTimer();
            }
        }

        function deleteVideo(event, index) {
            event.stopPropagation();
            if (confirm('Are you sure you want to delete this video?')) {
                appState.videos.splice(index, 1);
                saveVideos();
                renderVideos();
            }
        }

        // ==================== PLAYER CONTROLS ====================
        function handleFullscreen() {
            const container = document.querySelector('.player-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log('Fullscreen error:', err));
            } else {
                document.exitFullscreen();
            }
        }

        function handleAutoplay() {
            appState.autoplay = !appState.autoplay;
            const btn = document.getElementById('autoplayBtn');
            btn.textContent = `▶️ Autoplay: ${appState.autoplay ? 'ON' : 'OFF'}`;
            btn.classList.toggle('active');
        }

        function handleTimer() {
            if (appState.timerActive) {
                resetTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            appState.timerActive = true;
            appState.timerMinutes = APP_CONFIG.WATCH_TIME_DEFAULT;
            
            const btn = document.getElementById('timerBtn');
            btn.textContent = '⏱️ Timer: ON';
            btn.classList.add('active');
            
            const display = document.getElementById('timerDisplay');
            display.style.display = 'flex';
            updateTimerDisplay();

            const timerInterval = setInterval(() => {
                appState.timerMinutes--;
                updateTimerDisplay();

                if (appState.timerMinutes <= 0) {
                    clearInterval(timerInterval);
                    alert('⏰ Watch time limit reached! Time to take a break.');
                    resetTimer();
                }
            }, 60000);

            appState.timerInterval = timerInterval;
        }

        function resetTimer() {
            appState.timerActive = false;
            appState.timerMinutes = APP_CONFIG.WATCH_TIME_DEFAULT;
            
            if (appState.timerInterval) {
                clearInterval(appState.timerInterval);
            }

            const btn = document.getElementById('timerBtn');
            btn.textContent = '⏱️ Timer: OFF';
            btn.classList.remove('active');
            
            document.getElementById('timerDisplay').style.display = 'none';
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(appState.timerMinutes);
            const seconds = Math.floor((appState.timerMinutes - minutes) * 60);
            const display = document.getElementById('timerDisplay');
            display.textContent = `Time: ${minutes}:${String(seconds).padStart(2, '0')}`;
        }

        // ==================== SEARCH ====================
        function handleSearch() {
            renderVideos();
        }

        // ==================== STORAGE ====================
        function saveVideos() {
            localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify(appState.videos));
        }

        function loadVideos() {
            const stored = localStorage.getItem(APP_CONFIG.STORAGE_KEY);
            if (stored) {
                appState.videos = JSON.parse(stored);
            }
        }

        // ==================== MODALS ====================
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // ==================== KEYBOARD & TV REMOTE ====================
        function handleKeyboard(event) {
            const key = event.key.toLowerCase();

            if (key === 'arrowup' || key === 'arrowdown' || key === 'arrowleft' || key === 'arrowright') {
                event.preventDefault();
                handleArrowNavigation(key);
            }

            if (key === 'enter') {
                const focused = document.activeElement;
                if (focused.classList.contains('video-card')) {
                    focused.click();
                }
            }

            if (key === 'escape') {
                closeAllModals();
            }

            if (key === 'f') {
                handleFullscreen();
            }

            if (key === 'p' && event.ctrlKey) {
                event.preventDefault();
                handleAdminToggle();
            }
        }

        function handleArrowNavigation(direction) {
            const focused = document.activeElement;
            const videoCards = document.querySelectorAll('.video-card');
            
            if (direction === 'arrowdown' || direction === 'arrowup') {
                const currentIndex = Array.from(videoCards).indexOf(focused);
                if (direction === 'arrowdown' && currentIndex < videoCards.length - 1) {
                    videoCards[currentIndex + 1].focus();
                } else if (direction === 'arrowup' && currentIndex > 0) {
                    videoCards[currentIndex - 1].focus();
                }
            }
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(modal => {
                modal.classList.remove('active');
            });
        }

        loadVideos();
        if (appState.videos.length === 0) {
            appState.videos = [...defaultVideos];
            saveVideos();
        }
    </script>
</body>
</html>
